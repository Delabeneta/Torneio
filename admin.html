<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Torneio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f13;
      min-height: 100vh;
      padding: 40px 20px;
      color: #e0e0e0;
    }

    .container { max-width: 620px; margin: 0 auto; }

    .card {
      background: #1a1a22;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 36px;
    }

    .card-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #2a2a38; }
    .card-header h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .card-header p  { font-size: 14px; color: #888; }

    /* Current info box */
    .info-box {
      background: #13131a;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.8;
    }
    .info-box h3 { font-size: 13px; font-weight: 600; color: #7c6fe0; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .info-box span { color: #aaa; }
    .info-box strong { color: #ddd; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid .full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; }

    input[type="text"],
    input[type="url"],
    input[type="datetime-local"] {
      width: 100%;
      padding: 10px 14px;
      background: #13131a;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      font-size: 14px;
      color: #e0e0e0;
      font-family: inherit;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #7c6fe0; }
    input::placeholder { color: #444; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: #7c6fe0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, transform .1s;
    }
    button[type="submit"]:hover   { background: #6a5ecc; }
    button[type="submit"]:active  { transform: scale(0.98); }
    button[type="submit"]:disabled { background: #444; cursor: not-allowed; }

    /* Feedback */
    .feedback {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .feedback.success { background: #0d2b1f; color: #4ade80; border: 1px solid #166534; display: block; }
    .feedback.error   { background: #2b0d0d; color: #f87171; border: 1px solid #7f1d1d; display: block; }
    .feedback.loading { background: #1a1a2e; color: #a5b4fc; border: 1px solid #3730a3; display: block; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">

    <div class="card-header">
      <h1>⚙️ Painel do Torneio</h1>
      <p>Atualize os dados — o site reflete as mudanças automaticamente</p>
    </div>

    <div class="info-box" id="currentInfo">
      <h3>Informações atuais</h3>
      <span>Carregando...</span>
    </div>

    <form id="updateForm">
      <div class="form-grid">

        <div class="field full">
          <label>Nome do Torneio</label>
          <input type="text" id="tournament_name" required placeholder="Ex: TORNEIO DE FUTSAL — JOAM">
        </div>

        <div class="field full">
          <label>Data e Hora</label>
          <input type="datetime-local" id="tournament_date" required>
        </div>

        <div class="field full">
          <label>Local</label>
          <input type="text" id="tournament_location" required placeholder="Nome e endereço do local">
        </div>

        <div class="field">
          <label>Valor da Inscrição</label>
          <input type="text" id="registration_price" required placeholder="R$ 100,00">
        </div>

        <div class="field">
          <label>Chave PIX</label>
          <input type="text" id="pix_key" required placeholder="email ou telefone">
        </div>

        <div class="field">
          <label>WhatsApp</label>
          <input type="text" id="whatsapp_number" required placeholder="+55 21 97456-3511">
        </div>

        <div class="field">
          <label>URL do Formulário</label>
          <input type="url" id="form_url" required placeholder="https://form.typeform.com/...">
        </div>

      </div>

      <button type="submit" id="submitBtn">🚀 Atualizar torneio</button>
    </form>

    <div class="feedback" id="feedback"></div>

  </div>
</div>

<script>
  // ⬇️ Substitua pela URL do seu Apps Script publicado
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxY1wBnV8na2U61jxDyIw8YbtNS_U3HnMVThU049LNP7HjenqM83ppuRrjZ9DUQa8Xr/exec';

  const SHEET_ID  = '1tvDoz3oA_yfYAwYVcoOscTWMRvnL02TOqpEY2Mum8V0';
  // TSV para evitar quebra em campos com vírgula
  const TSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=tsv`;

  // ── Carregar dados atuais ──
  async function loadCurrentInfo() {
    try {
      const res  = await fetch(TSV_URL + '&t=' + Date.now());
      const text = await res.text();
      const lines = text.split('\n').filter(l => l.trim());

      if (lines.length < 2) throw new Error('Sem dados');

      const headers = lines[0].split('\t').map(h => h.trim());
      const values  = lines[1].split('\t').map(v => v.replace(/^"|"$/g, '').trim());

      const d = {};
      headers.forEach((h, i) => d[h] = values[i] || '');

      // Preencher form
      fill('tournament_name',     d.tournament_name);
      fill('tournament_location', d.tournament_location);
      fill('registration_price',  d.registration_price);
      fill('pix_key',             d.pix_key);
      fill('whatsapp_number',     d.whatsapp_number);
      fill('form_url',            d.form_url);

      if (d.tournament_date) {
        const dt = new Date(d.tournament_date);
        if (!isNaN(dt)) {
          document.getElementById('tournament_date').value = dt.toISOString().slice(0, 16);
        }
      }

      document.getElementById('currentInfo').innerHTML = `
        <h3>Informações atuais</h3>
        <span>Torneio:</span> <strong>${d.tournament_name || '—'}</strong><br>
        <span>Data:</span> <strong>${d.tournament_date || '—'}</strong><br>
        <span>Local:</span> <strong>${d.tournament_location || '—'}</strong><br>
        <span>Valor:</span> <strong>${d.registration_price || '—'}</strong>
      `;

    } catch (err) {
      document.getElementById('currentInfo').innerHTML =
        '<h3>Informações atuais</h3><span style="color:#f87171">Não foi possível carregar os dados atuais.</span>';
    }
  }

  function fill(id, value) {
    if (value) document.getElementById(id).value = value;
  }

  function showFeedback(type, msg) {
    const el = document.getElementById('feedback');
    el.className = 'feedback ' + type;
    el.textContent = msg;
  }

  // ── Enviar atualização ──
  document.getElementById('updateForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    showFeedback('loading', '⏳ Enviando dados para a planilha...');

    const raw  = document.getElementById('tournament_date').value;
    const date = raw ? raw.replace('T', ' ') + ':00' : '';

    const payload = {
      tournament_name:     document.getElementById('tournament_name').value.trim(),
      tournament_date:     date,
      tournament_location: document.getElementById('tournament_location').value.trim(),
      registration_price:  document.getElementById('registration_price').value.trim(),
      pix_key:             document.getElementById('pix_key').value.trim(),
      whatsapp_number:     document.getElementById('whatsapp_number').value.trim(),
      form_url:            document.getElementById('form_url').value.trim()
    };

    try {
      // no-cors é necessário para Apps Script sem proxy
      // Não conseguimos ler a resposta, mas o dado chega normalmente
      await fetch(SCRIPT_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });

      showFeedback('success', '✅ Dados enviados! O site será atualizado em instantes.');

      // Recarregar painel após 2s para confirmar gravação
      setTimeout(loadCurrentInfo, 2500);

    } catch (err) {
      showFeedback('error', '❌ Erro ao enviar: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 Atualizar torneio';
    }
  });

  loadCurrentInfo();
</script>
</body>
</html>
